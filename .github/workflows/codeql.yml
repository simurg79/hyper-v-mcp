name: CodeQL

# Static security analysis (code scanning) for the C# sources.
#
# Uses build-mode "none" so the analysis does not have to reproduce the
# project's specialized build (PowerShell SDK + post-build module stripping).
# This scans the source directly and keeps the workflow fast and reliable.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 09:00 UTC — catches newly published CodeQL queries.
    - cron: '0 9 * * 1'

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (csharp)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:csharp"
